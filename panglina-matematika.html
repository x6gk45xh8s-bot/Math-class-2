<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Panglina">
<title>Panglina – Kočičí Matematika</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(160deg, #ffecd2 0%, #fcb69f 40%, #ffd6e7 100%);
    min-height: 100vh;
    padding: 16px;
    overflow-x: hidden;
  }

  #app { max-width: 480px; margin: 0 auto; }

  /* ANIMATIONS */
  @keyframes floatCat { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-10px) rotate(3deg)} }
  @keyframes pop { 0%{transform:scale(0.4);opacity:0} 65%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  @keyframes flyUp { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-70px);opacity:0} }
  @keyframes heartUp { 0%{transform:translateY(0) scale(0.8);opacity:1} 100%{transform:translateY(-55px) scale(1.3);opacity:0} }
  @keyframes confettiFall { 0%{transform:translateY(-10px) rotate(0);opacity:1} 100%{transform:translateY(200px) rotate(540deg);opacity:0} }
  @keyframes slideIn { 0%{transform:translateX(50px);opacity:0} 100%{transform:translateX(0);opacity:1} }
  @keyframes twinkle { 0%,100%{opacity:0.15} 50%{opacity:0.5} }
  @keyframes catHappy { 0%,100%{transform:scale(1)} 25%{transform:scale(1.12) rotate(-5deg)} 75%{transform:scale(1.12) rotate(5deg)} }
  @keyframes catSad { 0%,100%{transform:translateX(0)} 30%{transform:translateX(-6px)} 70%{transform:translateX(6px)} }
  @keyframes nameShine { 0%,100%{filter:drop-shadow(0 0 0px #ff8c00)} 50%{filter:drop-shadow(0 0 8px #ff8c00)} }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== MENU ===== */
  .menu-title {
    text-align: center;
    font-size: 34px;
    font-weight: 900;
    color: #c0392b;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
    margin-bottom: 2px;
  }
  .menu-sub {
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    color: #a0522d;
    margin-bottom: 10px;
  }

  .cat-hero-wrap {
    text-align: center;
    margin: 6px 0 4px;
  }
  .cat-hero-svg {
    display: inline-block;
    animation: floatCat 3s ease-in-out infinite;
  }

  .panglina-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: white;
    border-radius: 30px;
    padding: 7px 20px;
    box-shadow: 0 4px 16px rgba(192,57,43,0.2);
    width: fit-content;
    margin: 0 auto 12px;
    animation: nameShine 3s ease-in-out infinite;
  }
  .panglina-badge-text {
    font-size: 22px;
    font-weight: 900;
    color: #c0392b;
  }

  .fish-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(255,255,255,0.55);
    border-radius: 30px;
    padding: 8px 20px;
    width: fit-content;
    margin: 0 auto 14px;
    font-weight: 700;
    font-size: 16px;
    color: #a0522d;
  }

  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 360px;
    margin: 0 auto 12px;
  }
  .mode-card {
    border: none;
    border-radius: 20px;
    padding: 16px 10px;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 5px 18px rgba(192,57,43,0.15);
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
  }
  .mode-card:active { transform: scale(0.95); }
  .mode-icon { font-size: 36px; display: block; margin-bottom: 4px; line-height: 1; }
  .mode-name { font-size: 19px; font-weight: 900; color: #8b3a2a; }
  .mode-desc { font-size: 11px; color: #b07060; margin-top: 2px; }
  .mode-card.add { background: linear-gradient(135deg,#fff9e6,#fff0cc); }
  .mode-card.sub { background: linear-gradient(135deg,#e8f8ff,#d0eeff); }
  .mode-card.mul { background: linear-gradient(135deg,#f0fff0,#d8ffd8); }
  .mode-card.mix { background: linear-gradient(135deg,#fff0f8,#ffd8ee); }

  .cat-progress {
    max-width: 360px;
    margin: 0 auto;
    background: rgba(255,255,255,0.5);
    border-radius: 16px;
    padding: 10px 14px;
  }
  .cp-title { font-weight: 700; font-size: 12px; color: #8b3a2a; margin-bottom: 6px; }
  .cp-cats { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .cp-cat-item { font-size: 26px; transition: all 0.3s; }
  .cp-cat-item.locked { opacity: 0.25; filter: grayscale(1); }

  .cats-btn {
    display: block;
    width: fit-content;
    margin: 8px auto 0;
    background: rgba(255,255,255,0.55);
    border: 2px solid rgba(192,57,43,0.2);
    border-radius: 14px;
    padding: 7px 16px;
    font-weight: 700;
    font-size: 13px;
    color: #8b3a2a;
    cursor: pointer;
    -webkit-appearance: none;
  }

  /* ===== GAME SCREEN ===== */
  .game-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .back-btn {
    background: rgba(255,255,255,0.6);
    border: 2px solid rgba(192,57,43,0.25);
    border-radius: 12px;
    padding: 8px 12px;
    color: #8b3a2a;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    -webkit-appearance: none;
  }
  .prog-wrap { flex: 1; height: 14px; background: rgba(255,255,255,0.4); border-radius: 7px; overflow: hidden; }
  .prog-fill { height: 100%; background: linear-gradient(90deg,#ff9800,#f44336); border-radius: 7px; transition: width 0.4s; width: 0%; }
  .q-num { font-weight: 700; font-size: 14px; color: #8b3a2a; white-space: nowrap; }

  .cat-companion {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    margin-bottom: 10px;
  }
  .cat-sprite-wrap { position: relative; flex-shrink: 0; }
  .cat-sprite { display: block; transition: all 0.3s; }
  .cat-sprite.happy { animation: catHappy 0.5s ease; }
  .cat-sprite.sad { animation: catSad 0.5s ease; }
  .cat-name-tag {
    position: absolute;
    bottom: -2px;
    left: 50%;
    transform: translateX(-50%);
    background: #c0392b;
    color: white;
    border-radius: 8px;
    padding: 2px 8px;
    font-weight: 700;
    font-size: 11px;
    white-space: nowrap;
  }
  .speech-bubble {
    background: white;
    border-radius: 16px 16px 16px 4px;
    padding: 10px 13px;
    font-size: 13px;
    font-weight: 700;
    color: #8b3a2a;
    box-shadow: 0 3px 12px rgba(0,0,0,0.1);
    min-height: 44px;
    display: flex;
    align-items: center;
    animation: slideIn 0.3s ease;
    flex: 1;
    position: relative;
  }
  .speech-bubble::before {
    content: '';
    position: absolute;
    left: -8px;
    bottom: 10px;
    border: 8px solid transparent;
    border-right-color: white;
    border-left: 0;
  }

  .q-card {
    background: white;
    border-radius: 22px;
    padding: 20px 16px 16px;
    text-align: center;
    margin-bottom: 12px;
    box-shadow: 0 6px 24px rgba(192,57,43,0.15);
  }
  .op-badge {
    display: inline-block;
    border-radius: 20px;
    padding: 3px 14px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .op-badge.add { background: #fff0cc; color: #e07800; }
  .op-badge.sub { background: #d0eeff; color: #0070c0; }
  .op-badge.mul { background: #d8ffd8; color: #007830; }

  .q-text {
    font-size: 52px;
    font-weight: 900;
    color: #3a1a0a;
    margin-bottom: 4px;
    line-height: 1.1;
    letter-spacing: -1px;
  }
  .q-hint { font-size: 13px; color: #bbb; min-height: 18px; }

  .ans-input {
    font-size: 44px;
    font-weight: 900;
    color: #8b3a2a;
    border: 3px solid #ffb997;
    border-radius: 14px;
    padding: 8px 16px;
    width: 160px;
    text-align: center;
    outline: none;
    background: #fffaf7;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-top: 8px;
    -webkit-appearance: none;
  }
  .ans-input.correct { border-color: #22c55e; background: #f0fff8; animation: pop 0.3s ease; }
  .ans-input.wrong { border-color: #ef4444; background: #fff0f0; animation: shake 0.3s ease; }

  .feedback { height: 30px; text-align: center; font-size: 20px; font-weight: 900; margin-top: 6px; }
  .feedback.correct { color: #16a34a; }
  .feedback.wrong { color: #dc2626; }

  .streak-area { text-align: center; min-height: 26px; margin-bottom: 6px; }
  .streak-badge {
    display: inline-block;
    background: linear-gradient(135deg,#ff9800,#ff5722);
    color: white;
    border-radius: 20px;
    padding: 3px 14px;
    font-weight: 700;
    font-size: 13px;
    animation: pop 0.3s;
  }

  /* NUMPAD */
  .numpad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    max-width: 320px;
    margin: 0 auto;
  }
  .nb {
    background: white;
    border: none;
    border-radius: 16px;
    padding: 18px 0;
    font-size: 26px;
    font-weight: 900;
    color: #8b3a2a;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(192,57,43,0.13);
    transition: transform 0.1s;
    -webkit-appearance: none;
    line-height: 1;
  }
  .nb:active { transform: scale(0.88); }
  .nb.zero { grid-column: span 2; }
  .nb.del { background: #ffe0d0; color: #c0392b; font-size: 22px; }
  .nb.ok { background: linear-gradient(135deg,#ff7043,#e53935); color: white; font-size: 22px; }

  /* FLYING ELEMENTS */
  .fly-item { position: fixed; pointer-events: none; z-index: 999; }
  .fly-fish { animation: flyUp 1s ease forwards; font-size: 28px; }
  .fly-heart { animation: heartUp 1s ease forwards; font-size: 24px; }

  /* RESULTS */
  .result-wrap { max-width: 400px; margin: 0 auto; animation: pop 0.4s ease; }
  .result-cat-wrap { text-align: center; margin-bottom: 6px; }
  .result-cat-name { font-size: 18px; font-weight: 900; color: #c0392b; display: block; margin-top: 4px; }

  .result-card {
    background: white;
    border-radius: 24px;
    padding: 22px 20px;
    text-align: center;
    box-shadow: 0 8px 28px rgba(192,57,43,0.18);
  }
  .result-title { font-size: 30px; font-weight: 900; color: #8b3a2a; margin-bottom: 4px; }
  .result-score { font-size: 15px; color: #aaa; margin-bottom: 14px; }

  .fish-earned { display: flex; justify-content: center; gap: 8px; font-size: 32px; margin-bottom: 14px; }
  .fish-e { opacity: 0.15; transition: opacity 0.3s; display: inline-block; }
  .fish-e.lit { opacity: 1; animation: pop 0.3s ease; }

  .unlock-msg {
    background: #fff8e6;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 700;
    color: #a06020;
    margin-bottom: 12px;
    display: none;
  }
  .unlock-msg.show { display: block; animation: pop 0.4s ease; }

  .rbtn {
    display: inline-block;
    border: none;
    border-radius: 14px;
    padding: 13px 24px;
    font-size: 17px;
    font-weight: 900;
    cursor: pointer;
    margin: 5px;
    transition: transform 0.15s;
    box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    -webkit-appearance: none;
  }
  .rbtn.primary { background: linear-gradient(135deg,#ff7043,#e53935); color: white; }
  .rbtn.secondary { background: white; color: #8b3a2a; border: 2px solid #ffb997; }
  .rbtn:active { transform: scale(0.95); }

  /* COLLECTION */
  .coll-overlay {
    position: fixed;
    inset: 0;
    background: rgba(80,20,10,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .coll-overlay.open { display: flex; }
  .coll-box {
    background: white;
    border-radius: 22px;
    padding: 20px;
    max-width: 340px;
    width: 100%;
    animation: pop 0.35s ease;
    max-height: 90vh;
    overflow-y: auto;
  }
  .coll-title { font-size: 22px; font-weight: 900; color: #8b3a2a; text-align: center; margin-bottom: 12px; }
  .coll-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 14px; }
  .coll-item { text-align: center; padding: 8px 4px; border-radius: 12px; background: #fff8f0; }
  .coll-item.panglina-item { border: 2px solid #ff7043; background: #fff4f0; }
  .coll-item.locked { opacity: 0.5; filter: grayscale(0.8); }
  .coll-cat { font-size: 30px; display: block; margin-bottom: 3px; line-height: 1; }
  .coll-name { font-size: 10px; font-weight: 700; color: #a06040; line-height: 1.2; }
  .coll-item.panglina-item .coll-name { color: #c0392b; }
  .coll-close {
    display: block; width: 100%;
    background: linear-gradient(135deg,#ff7043,#e53935);
    color: white; border: none; border-radius: 12px;
    padding: 12px; font-size: 17px; font-weight: 900;
    cursor: pointer; -webkit-appearance: none;
  }

  /* BG DECO */
  .bg-paw { position: fixed; pointer-events: none; font-size: 24px; opacity: 0.08; animation: twinkle 4s infinite; z-index: 0; }
</style>
</head>
<body>

<!-- BG DECO -->
<div class="bg-paw" style="left:8%;top:10%;animation-delay:0s">🐾</div>
<div class="bg-paw" style="left:80%;top:15%;animation-delay:1s">🐟</div>
<div class="bg-paw" style="left:20%;top:75%;animation-delay:2s">🐾</div>
<div class="bg-paw" style="left:70%;top:70%;animation-delay:0.5s">💕</div>
<div class="bg-paw" style="left:50%;top:40%;animation-delay:1.5s">🐾</div>

<div id="app">

  <!-- ===== MENU ===== -->
  <div class="screen active" id="menuScreen">
    <div class="menu-title">Kocici Matematika</div>
    <div class="menu-sub">Pomoz Pangline ziskat ribicky!</div>

    <div class="cat-hero-wrap">
      <div class="cat-hero-svg">
        <!-- SVG Panglina cat - orange tabby -->
        <svg width="110" height="110" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
          <!-- tail -->
          <path d="M78 85 Q100 75 95 55 Q90 45 82 50" stroke="#e07030" stroke-width="7" fill="none" stroke-linecap="round"/>
          <!-- body -->
          <ellipse cx="55" cy="78" rx="28" ry="22" fill="#f5a043"/>
          <!-- belly -->
          <ellipse cx="55" cy="82" rx="16" ry="14" fill="#fde8c8"/>
          <!-- head -->
          <circle cx="55" cy="45" r="26" fill="#f5a043"/>
          <!-- ears -->
          <polygon points="32,26 26,8 44,22" fill="#f5a043"/>
          <polygon points="78,26 84,8 66,22" fill="#f5a043"/>
          <polygon points="34,24 30,12 43,22" fill="#f0a0a0"/>
          <polygon points="76,24 80,12 67,22" fill="#f0a0a0"/>
          <!-- stripes head -->
          <path d="M44 30 Q55 27 66 30" stroke="#c96020" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M42 34 Q55 31 68 34" stroke="#c96020" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <!-- eyes -->
          <ellipse cx="44" cy="44" rx="6" ry="7" fill="#ffffee"/>
          <ellipse cx="66" cy="44" rx="6" ry="7" fill="#ffffee"/>
          <ellipse cx="44" cy="45" rx="3.5" ry="5" fill="#3a8020"/>
          <ellipse cx="66" cy="45" rx="3.5" ry="5" fill="#3a8020"/>
          <circle cx="43" cy="44" r="1.5" fill="#111"/>
          <circle cx="65" cy="44" r="1.5" fill="#111"/>
          <circle cx="45" cy="42" r="1" fill="white"/>
          <circle cx="67" cy="42" r="1" fill="white"/>
          <!-- nose -->
          <polygon points="55,53 52,57 58,57" fill="#e05080"/>
          <!-- mouth -->
          <path d="M52,57 Q55,61 58,57" stroke="#c04060" stroke-width="1.5" fill="none"/>
          <path d="M55,57 L55,53" stroke="#c04060" stroke-width="1"/>
          <!-- whiskers -->
          <line x1="25" y1="52" x2="48" y2="54" stroke="#a06030" stroke-width="1.2"/>
          <line x1="25" y1="56" x2="48" y2="56" stroke="#a06030" stroke-width="1.2"/>
          <line x1="62" y1="54" x2="85" y2="52" stroke="#a06030" stroke-width="1.2"/>
          <line x1="62" y1="56" x2="85" y2="56" stroke="#a06030" stroke-width="1.2"/>
          <!-- front paws -->
          <ellipse cx="42" cy="98" rx="10" ry="7" fill="#f5a043"/>
          <ellipse cx="68" cy="98" rx="10" ry="7" fill="#f5a043"/>
          <ellipse cx="42" cy="100" rx="7" ry="5" fill="#fde8c8"/>
          <ellipse cx="68" cy="100" rx="7" ry="5" fill="#fde8c8"/>
          <!-- stripes body -->
          <path d="M40 68 Q55 65 70 68" stroke="#c96020" stroke-width="2" fill="none"/>
          <path d="M38 75 Q55 72 72 75" stroke="#c96020" stroke-width="1.5" fill="none"/>
        </svg>
      </div>
    </div>

    <div class="panglina-badge">
      <svg width="18" height="18" viewBox="0 0 20 20"><path d="M10 2 L12 7 L17 7 L13 11 L14.5 16 L10 13 L5.5 16 L7 11 L3 7 L8 7 Z" fill="#ff8c00"/></svg>
      <span class="panglina-badge-text">Panglina</span>
      <svg width="18" height="18" viewBox="0 0 20 20"><path d="M10 2 L12 7 L17 7 L13 11 L14.5 16 L10 13 L5.5 16 L7 11 L3 7 L8 7 Z" fill="#ff8c00"/></svg>
    </div>

    <div class="fish-bar">
      <svg width="22" height="16" viewBox="0 0 22 16"><path d="M14 8 Q18 2 22 8 Q18 14 14 8 Z" fill="#4a90d9"/><ellipse cx="10" cy="8" rx="9" ry="6" fill="#5aafef"/><circle cx="6" cy="6" r="1.5" fill="#1a4a7a"/><path d="M1 3 L5 8 L1 13 Z" fill="#4a90d9"/><line x1="12" y1="5" x2="12" y2="11" stroke="#3a80c9" stroke-width="1"/><line x1="9" y1="4" x2="9" y2="12" stroke="#3a80c9" stroke-width="1"/></svg>
      <span id="totalFish">0</span> ribicek &nbsp;·&nbsp;
      <svg width="18" height="18" viewBox="0 0 110 110"><circle cx="55" cy="45" r="22" fill="#f5a043"/><polygon points="35,28 29,12 47,24" fill="#f5a043"/><polygon points="75,28 81,12 63,24" fill="#f5a043"/><ellipse cx="46" cy="45" rx="4" ry="5" fill="#3a8020"/><ellipse cx="64" cy="45" rx="4" ry="5" fill="#3a8020"/><polygon points="55,51 52,54 58,54" fill="#e05080"/></svg>
      <span id="catsUnlocked">1</span>/8
    </div>

    <div class="mode-grid">
      <button class="mode-card add" onclick="startGame('add')">
        <span class="mode-icon" style="font-size:32px;color:#e07800;font-weight:900;display:block;margin-bottom:4px">+</span>
        <div class="mode-name">Scitani</div>
        <div class="mode-desc">Cisla do 30</div>
      </button>
      <button class="mode-card sub" onclick="startGame('sub')">
        <span class="mode-icon" style="font-size:40px;color:#0070c0;font-weight:900;display:block;margin-bottom:4px;line-height:0.9">-</span>
        <div class="mode-name">Odcitani</div>
        <div class="mode-desc">Odebirej cisla</div>
      </button>
      <button class="mode-card mul" onclick="startGame('mul')">
        <span class="mode-icon" style="font-size:28px;color:#007830;font-weight:900;display:block;margin-bottom:4px">x</span>
        <div class="mode-name">Nasobilka</div>
        <div class="mode-desc">1x az 5x</div>
      </button>
      <button class="mode-card mix" onclick="startGame('mix')">
        <span class="mode-icon" style="font-size:30px;display:block;margin-bottom:4px">?</span>
        <div class="mode-name">Mix</div>
        <div class="mode-desc">Vse dohromady</div>
      </button>
    </div>

    <div class="cat-progress">
      <div class="cp-title">Panglinini pratele – sbírej ribicky a odemykej!</div>
      <div class="cp-cats" id="cpCats"></div>
    </div>
    <button class="cats-btn" onclick="openCollection()">Panglinin gang</button>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div class="screen" id="gameScreen">
    <div class="game-header">
      <button class="back-btn" onclick="goMenu()">Zpet</button>
      <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
      <div class="q-num" id="qNum">1/10</div>
    </div>

    <div class="cat-companion">
      <div class="cat-sprite-wrap">
        <svg class="cat-sprite" id="catSprite" width="72" height="80" viewBox="0 0 110 115" xmlns="http://www.w3.org/2000/svg">
          <path d="M78 90 Q100 78 95 55 Q90 42 82 50" stroke="#e07030" stroke-width="7" fill="none" stroke-linecap="round"/>
          <ellipse cx="55" cy="84" rx="28" ry="22" fill="#f5a043"/>
          <ellipse cx="55" cy="88" rx="16" ry="13" fill="#fde8c8"/>
          <circle cx="55" cy="46" r="26" fill="#f5a043"/>
          <polygon points="32,27 26,9 44,23" fill="#f5a043"/>
          <polygon points="78,27 84,9 66,23" fill="#f5a043"/>
          <polygon points="34,25 30,13 43,23" fill="#f0a0a0"/>
          <polygon points="76,25 80,13 67,23" fill="#f0a0a0"/>
          <path d="M44 31 Q55 28 66 31" stroke="#c96020" stroke-width="2" fill="none" stroke-linecap="round"/>
          <ellipse cx="44" cy="46" rx="6" ry="7" fill="#ffffee"/>
          <ellipse cx="66" cy="46" rx="6" ry="7" fill="#ffffee"/>
          <ellipse cx="44" cy="47" rx="3.5" ry="5" fill="#3a8020"/>
          <ellipse cx="66" cy="47" rx="3.5" ry="5" fill="#3a8020"/>
          <circle cx="43" cy="46" r="1.5" fill="#111"/>
          <circle cx="65" cy="46" r="1.5" fill="#111"/>
          <circle cx="45" cy="44" r="1" fill="white"/>
          <circle cx="67" cy="44" r="1" fill="white"/>
          <polygon points="55,54 52,58 58,58" fill="#e05080"/>
          <path d="M52,58 Q55,62 58,58" stroke="#c04060" stroke-width="1.5" fill="none"/>
          <line x1="24" y1="53" x2="48" y2="55" stroke="#a06030" stroke-width="1.2"/>
          <line x1="24" y1="57" x2="48" y2="57" stroke="#a06030" stroke-width="1.2"/>
          <line x1="62" y1="55" x2="86" y2="53" stroke="#a06030" stroke-width="1.2"/>
          <line x1="62" y1="57" x2="86" y2="57" stroke="#a06030" stroke-width="1.2"/>
          <ellipse cx="42" cy="104" rx="10" ry="7" fill="#f5a043"/>
          <ellipse cx="68" cy="104" rx="10" ry="7" fill="#f5a043"/>
          <ellipse cx="42" cy="106" rx="7" ry="5" fill="#fde8c8"/>
          <ellipse cx="68" cy="106" rx="7" ry="5" fill="#fde8c8"/>
        </svg>
        <div class="cat-name-tag">Panglina</div>
      </div>
      <div class="speech-bubble" id="speechBubble">Pojd pocitat! Ribicky cekaji!</div>
    </div>

    <div class="q-card">
      <div class="op-badge add" id="opBadge">Scitani</div>
      <div class="q-text" id="qText">3 + 4 = ?</div>
      <div class="q-hint" id="qHint"></div>
      <input class="ans-input" id="ansInput" type="text" inputmode="numeric" placeholder="?" readonly>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="streak-area" id="streakArea"></div>

    <div class="numpad">
      <button class="nb" onclick="pad(7)">7</button>
      <button class="nb" onclick="pad(8)">8</button>
      <button class="nb" onclick="pad(9)">9</button>
      <button class="nb del" onclick="padDel()">&#9003;</button>
      <button class="nb" onclick="pad(4)">4</button>
      <button class="nb" onclick="pad(5)">5</button>
      <button class="nb" onclick="pad(6)">6</button>
      <button class="nb ok" onclick="checkAns()">OK</button>
      <button class="nb" onclick="pad(1)">1</button>
      <button class="nb" onclick="pad(2)">2</button>
      <button class="nb" onclick="pad(3)">3</button>
      <button class="nb zero" onclick="pad(0)">0</button>
    </div>
  </div>

  <!-- ===== RESULTS ===== -->
  <div class="screen" id="resultsScreen">
    <div class="result-wrap">
      <div class="result-cat-wrap">
        <svg id="resCatSvg" width="90" height="90" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
          <circle cx="55" cy="45" r="26" fill="#f5a043"/>
          <polygon points="32,27 26,9 44,23" fill="#f5a043"/>
          <polygon points="78,27 84,9 66,23" fill="#f5a043"/>
          <polygon points="34,25 30,13 43,23" fill="#f0a0a0"/>
          <polygon points="76,25 80,13 67,23" fill="#f0a0a0"/>
          <ellipse cx="44" cy="46" rx="6" ry="7" fill="#ffffee"/>
          <ellipse cx="66" cy="46" rx="6" ry="7" fill="#ffffee"/>
          <ellipse cx="44" cy="47" rx="3.5" ry="5" fill="#3a8020"/>
          <ellipse cx="66" cy="47" rx="3.5" ry="5" fill="#3a8020"/>
          <circle cx="43" cy="46" r="1.5" fill="#111"/>
          <circle cx="65" cy="46" r="1.5" fill="#111"/>
          <circle cx="45" cy="44" r="1" fill="white"/>
          <circle cx="67" cy="44" r="1" fill="white"/>
          <polygon points="55,54 52,58 58,58" fill="#e05080"/>
          <!-- happy mouth by default -->
          <path id="resMouth" d="M50,58 Q55,64 60,58" stroke="#c04060" stroke-width="2" fill="none"/>
          <!-- hearts over eyes for very good result -->
          <text id="resHeart1" x="37" y="48" font-size="12" opacity="0" text-anchor="middle">&#9829;</text>
          <text id="resHeart2" x="73" y="48" font-size="12" opacity="0" text-anchor="middle">&#9829;</text>
          <line x1="24" y1="53" x2="48" y2="55" stroke="#a06030" stroke-width="1.2"/>
          <line x1="24" y1="57" x2="48" y2="57" stroke="#a06030" stroke-width="1.2"/>
          <line x1="62" y1="55" x2="86" y2="53" stroke="#a06030" stroke-width="1.2"/>
          <line x1="62" y1="57" x2="86" y2="57" stroke="#a06030" stroke-width="1.2"/>
          <ellipse cx="55" cy="80" rx="22" ry="16" fill="#f5a043"/>
          <ellipse cx="42" cy="96" rx="10" ry="7" fill="#f5a043"/>
          <ellipse cx="68" cy="96" rx="10" ry="7" fill="#f5a043"/>
        </svg>
        <span class="result-cat-name">Panglina</span>
      </div>
      <div class="result-card">
        <div class="result-title" id="resTitle">Vyborne!</div>
        <div class="result-score" id="resScore"></div>
        <div class="fish-earned">
          <span class="fish-e" id="f1">
            <svg width="30" height="22" viewBox="0 0 22 16"><path d="M14 8 Q18 2 22 8 Q18 14 14 8 Z" fill="#4a90d9"/><ellipse cx="10" cy="8" rx="9" ry="6" fill="#5aafef"/><circle cx="6" cy="6" r="1.5" fill="#1a4a7a"/><path d="M1 3 L5 8 L1 13 Z" fill="#4a90d9"/></svg>
          </span>
          <span class="fish-e" id="f2">
            <svg width="30" height="22" viewBox="0 0 22 16"><path d="M14 8 Q18 2 22 8 Q18 14 14 8 Z" fill="#4a90d9"/><ellipse cx="10" cy="8" rx="9" ry="6" fill="#5aafef"/><circle cx="6" cy="6" r="1.5" fill="#1a4a7a"/><path d="M1 3 L5 8 L1 13 Z" fill="#4a90d9"/></svg>
          </span>
          <span class="fish-e" id="f3">
            <svg width="30" height="22" viewBox="0 0 22 16"><path d="M14 8 Q18 2 22 8 Q18 14 14 8 Z" fill="#4a90d9"/><ellipse cx="10" cy="8" rx="9" ry="6" fill="#5aafef"/><circle cx="6" cy="6" r="1.5" fill="#1a4a7a"/><path d="M1 3 L5 8 L1 13 Z" fill="#4a90d9"/></svg>
          </span>
        </div>
        <div class="unlock-msg" id="unlockMsg"></div>
        <div id="resStreak" style="font-size:13px;color:#aaa;margin-bottom:10px;min-height:18px;"></div>
        <button class="rbtn primary" onclick="startGame(currentMode)">Hrat znovu</button>
        <button class="rbtn secondary" onclick="goMenu()">Menu</button>
      </div>
    </div>
  </div>

</div><!-- #app -->

<!-- COLLECTION OVERLAY -->
<div class="coll-overlay" id="collOverlay">
  <div class="coll-box">
    <div class="coll-title">Panglinin gang</div>
    <div class="coll-grid" id="collGrid"></div>
    <button class="coll-close" onclick="closeCollection()">Zavrit</button>
  </div>
</div>

<script>
// ---- DATA ----
const CATS = [
  { name:'Panglina', cost:0,  special:true,  color:'#f5a043', desc:'Tvoje oblibena!' },
  { name:'Smisek',   cost:5,  color:'#f0c040', desc:'Vzdy se smeje' },
  { name:'Strachak', cost:12, color:'#a0a0ff', desc:'Trochu se boji' },
  { name:'Zamilka',  cost:20, color:'#ff80a0', desc:'Plna lasky' },
  { name:'Pruhac',   cost:30, color:'#80c080', desc:'Ma pruhy' },
  { name:'Cernosek', cost:45, color:'#505050', desc:'Cerny jak noc' },
  { name:'Chichot',  cost:60, color:'#d080d0', desc:'Porad se smeje' },
  { name:'Lev Kral', cost:80, color:'#e09020', desc:'Kral vsech kocek' },
];

const OK_MSGS = [
  'Mnau! Spravne! Ribicka je moje!',
  'Skvele! Panglina je rada!',
  'Vyborne! Mnauuu!',
  'Pani! To jsme zvladly!',
  'Spravne! Jsem na tebe pyshna!',
  'Jee! Ribicka! Mnau!',
];
const BAD_MSGS = [
  'Mnau? Zkus znovu...',
  'Hmm, skoro! Mnau',
  'Nevadi! Priste to dame!',
  'Panglina veri, ze priste das!',
];
const GREET = [
  'Pojd pocitat! Ribicky cekaji!',
  'Umis to! Pojdme na to!',
  'Pocitame spolu, Panglina a ty!',
  'Ja verim v tebe!',
  'Hura na priklady! Mnau!',
  'Dnes dostaneme spoustu ribicek!',
];

const TOTAL_Q = 10;
let mode='add', qs=[], curQ=0, correct=0, streak=0, maxStreak=0;
let totalFish=0, answered=false, currentMode='add';
let unlockedCats=[0];

function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function rndOf(arr){ return arr[rnd(0,arr.length-1)]; }

function catSvgSmall(c) {
  const col = c.color || '#f5a043';
  return `<svg width="34" height="34" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
    <circle cx="55" cy="46" r="26" fill="${col}"/>
    <polygon points="32,27 26,9 44,23" fill="${col}"/>
    <polygon points="78,27 84,9 66,23" fill="${col}"/>
    <polygon points="34,25 30,13 43,23" fill="#f0a0a0"/>
    <polygon points="76,25 80,13 67,23" fill="#f0a0a0"/>
    <ellipse cx="44" cy="47" rx="5" ry="6" fill="#ffffee"/>
    <ellipse cx="66" cy="47" rx="5" ry="6" fill="#ffffee"/>
    <ellipse cx="44" cy="48" rx="2.8" ry="4" fill="#3a6010"/>
    <ellipse cx="66" cy="48" rx="2.8" ry="4" fill="#3a6010"/>
    <polygon points="55,54 52,58 58,58" fill="#e05080"/>
    <path d="M52,58 Q55,62 58,58" stroke="#c04060" stroke-width="1.5" fill="none"/>
  </svg>`;
}

function genQ(m){
  const op = m==='mix' ? ['add','sub','mul'][rnd(0,2)] : m;
  let a,b,ans,text,hint;
  if(op==='add'){
    a=rnd(1,18); b=rnd(1,Math.min(18,28-a));
    ans=a+b; text=`${a} + ${b} = ?`; hint=a<=5&&b<=5?'Spocitej na prstech!':'';
  } else if(op==='sub'){
    a=rnd(5,20); b=rnd(1,a); ans=a-b; text=`${a} - ${b} = ?`; hint='';
  } else {
    const t=[1,2,3,4,5,10];
    a=rndOf(t); b=rnd(1,5); ans=a*b; text=`${a} x ${b} = ?`;
    hint=a===2?'Dvakrat tolik!':a===10?'Pridej nulu!':'';
  }
  return {text,ans,op,hint};
}

function updateMenuUI(){
  document.getElementById('totalFish').textContent = totalFish;
  document.getElementById('catsUnlocked').textContent = unlockedCats.length;
  renderCpCats();
}

function renderCpCats(){
  const el = document.getElementById('cpCats');
  el.innerHTML = '';
  CATS.forEach((c,i) => {
    const d = document.createElement('div');
    d.innerHTML = catSvgSmall(c);
    d.title = unlockedCats.includes(i) ? c.name : c.name+' ('+c.cost+' ribicek)';
    if(!unlockedCats.includes(i)) d.style.opacity='0.2', d.style.filter='grayscale(1)';
    el.appendChild(d);
  });
}

function openCollection(){
  const g = document.getElementById('collGrid');
  g.innerHTML = '';
  CATS.forEach((c,i) => {
    const unlocked = unlockedCats.includes(i);
    const div = document.createElement('div');
    div.className = 'coll-item' + (c.special?' panglina-item':'') + (unlocked?'':' locked');
    div.innerHTML = `<span class="coll-cat">${catSvgSmall(c)}</span><div class="coll-name">${unlocked ? c.name+(c.special?' ★':'') : c.cost+' rib.'}</div>`;
    g.appendChild(div);
  });
  document.getElementById('collOverlay').classList.add('open');
}
function closeCollection(){ document.getElementById('collOverlay').classList.remove('open'); }

function startGame(m){
  currentMode = mode = m;
  qs = Array.from({length:TOTAL_Q}, () => genQ(m));
  curQ=0; correct=0; streak=0; maxStreak=0; answered=false;
  showScreen('gameScreen');
  document.getElementById('catSprite').className = 'cat-sprite';
  document.getElementById('speechBubble').textContent = rndOf(GREET);
  loadQ();
}

function loadQ(){
  answered = false;
  const q = qs[curQ];
  document.getElementById('qText').textContent = q.text;
  document.getElementById('qHint').textContent = q.hint || '';
  document.getElementById('ansInput').value = '';
  document.getElementById('ansInput').className = 'ans-input';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('qNum').textContent = `${curQ+1}/${TOTAL_Q}`;
  document.getElementById('progFill').style.width = `${(curQ/TOTAL_Q)*100}%`;
  document.getElementById('streakArea').innerHTML = streak>=3 ? `<span class="streak-badge">Série ${streak} v rade!</span>` : '';
  const labels = {add:'Scitani', sub:'Odcitani', mul:'Nasobilka'};
  const badge = document.getElementById('opBadge');
  badge.textContent = labels[q.op]; badge.className = 'op-badge '+q.op;
}

function pad(n){
  if(answered) return;
  const i = document.getElementById('ansInput');
  if(i.value.length < 3) i.value += n;
}
function padDel(){
  if(answered) return;
  const i = document.getElementById('ansInput');
  i.value = i.value.slice(0,-1);
}

function checkAns(){
  if(answered){ nextQ(); return; }
  const inp = document.getElementById('ansInput');
  if(!inp.value) return;
  const user = parseInt(inp.value);
  const q = qs[curQ];
  const fb = document.getElementById('feedback');
  const cat = document.getElementById('catSprite');
  const bub = document.getElementById('speechBubble');
  answered = true;

  if(user === q.ans){
    correct++; streak++; if(streak>maxStreak) maxStreak=streak;
    inp.className = 'ans-input correct';
    fb.className = 'feedback correct';
    fb.textContent = ['Spravne!','Vyborne!','Skvele!','Bravo!'][rnd(0,3)];
    cat.className = 'cat-sprite happy';
    bub.textContent = rndOf(OK_MSGS);
    spawnFish(); spawnHeart();
    if(streak>=3) document.getElementById('streakArea').innerHTML = `<span class="streak-badge">Serie ${streak} v rade!</span>`;
  } else {
    streak = 0;
    inp.className = 'ans-input wrong';
    fb.className = 'feedback wrong';
    fb.textContent = `Spravne je: ${q.ans}`;
    cat.className = 'cat-sprite sad';
    bub.textContent = rndOf(BAD_MSGS);
  }
  setTimeout(() => { cat.className='cat-sprite'; nextQ(); }, 1500);
}

function nextQ(){
  curQ++;
  if(curQ >= TOTAL_Q) showResults();
  else loadQ();
}

function showResults(){
  const pct = correct / TOTAL_Q;
  let title, fish;
  if(pct===1)      { title='Absolutni jednicka!'; fish=3; }
  else if(pct>=.8) { title='Panglina je nadsena!'; fish=3; }
  else if(pct>=.6) { title='Dobra prace!'; fish=2; }
  else if(pct>=.4) { title='Nevzdavej se!'; fish=1; }
  else             { title='Zkus to znovu!'; fish=1; }

  // Set cat expression
  const h1 = document.getElementById('resHeart1');
  const h2 = document.getElementById('resHeart2');
  const mouth = document.getElementById('resMouth');
  if(pct >= 0.8){
    h1.setAttribute('opacity','1'); h1.setAttribute('fill','#e03060');
    h2.setAttribute('opacity','1'); h2.setAttribute('fill','#e03060');
    mouth.setAttribute('d','M49,57 Q55,65 61,57');
  } else if(pct < 0.4){
    h1.setAttribute('opacity','0'); h2.setAttribute('opacity','0');
    mouth.setAttribute('d','M50,63 Q55,57 60,63');
  } else {
    h1.setAttribute('opacity','0'); h2.setAttribute('opacity','0');
    mouth.setAttribute('d','M50,58 Q55,64 60,58');
  }

  const earned = fish * (pct===1?5:pct>=.8?4:pct>=.6?3:2);
  totalFish += earned;

  let newCat = null;
  for(let i=0;i<CATS.length;i++){
    if(!unlockedCats.includes(i) && totalFish >= CATS[i].cost){
      unlockedCats.push(i); newCat = CATS[i];
    }
  }

  document.getElementById('resTitle').textContent = title;
  document.getElementById('resScore').textContent = `${correct} z ${TOTAL_Q} spravne · +${earned} ribicek (celkem ${totalFish})`;
  document.getElementById('resStreak').textContent = maxStreak>=3 ? `Nejlepsi serie: ${maxStreak} v rade!` : '';

  for(let i=1;i<=3;i++){
    const s = document.getElementById('f'+i);
    s.className = 'fish-e';
    if(i<=fish) setTimeout(()=>{ s.className='fish-e lit'; }, i*350);
  }

  const um = document.getElementById('unlockMsg');
  if(newCat){
    um.textContent = `Nova kocka odemcena: ${newCat.name}!`;
    um.className = 'unlock-msg show';
    setTimeout(spawnConfetti, 300);
  } else {
    const next = CATS.find((_,i)=>!unlockedCats.includes(i));
    if(next){ um.textContent=`Jeste ${next.cost-totalFish} ribicek do ${next.name}!`; um.className='unlock-msg show'; }
    else um.className = 'unlock-msg';
  }

  showScreen('resultsScreen');
  updateMenuUI();
  if(pct >= 0.8) setTimeout(spawnConfetti, 200);
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function goMenu(){ updateMenuUI(); showScreen('menuScreen'); }

function spawnFish(){
  const el = document.createElement('div');
  el.className = 'fly-item fly-fish';
  el.innerHTML = '<svg width="28" height="20" viewBox="0 0 22 16"><path d="M14 8 Q18 2 22 8 Q18 14 14 8 Z" fill="#4a90d9"/><ellipse cx="10" cy="8" rx="9" ry="6" fill="#5aafef"/><circle cx="6" cy="6" r="1.5" fill="#1a4a7a"/><path d="M1 3 L5 8 L1 13 Z" fill="#4a90d9"/></svg>';
  const r = document.querySelector('.q-card').getBoundingClientRect();
  el.style.left = (r.left + r.width/2 - 14)+'px';
  el.style.top = (r.top + 30)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1000);
}

function spawnHeart(){
  const el = document.createElement('div');
  el.className = 'fly-item fly-heart';
  el.innerHTML = '<svg width="22" height="20" viewBox="0 0 24 22"><path d="M12 20 Q2 12 2 6 Q2 2 6 2 Q9 2 12 6 Q15 2 18 2 Q22 2 22 6 Q22 12 12 20 Z" fill="#e03060"/></svg>';
  const r = document.getElementById('catSprite').getBoundingClientRect();
  el.style.left = (r.left + r.width/2 - 11)+'px';
  el.style.top = (r.top - 10)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1100);
}

function spawnConfetti(){
  const cols=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff9f1c','#ff69b4','#ff8c00'];
  for(let i=0;i<28;i++){
    setTimeout(()=>{
      const el = document.createElement('div');
      const col = cols[rnd(0,cols.length-1)];
      el.style.cssText = `position:fixed;width:10px;height:10px;pointer-events:none;z-index:999;background:${col};left:${Math.random()*window.innerWidth}px;top:60px;border-radius:${Math.random()>.5?'50%':'2px'};animation:confettiFall 1.5s ease forwards;animation-delay:${Math.random()*0.4}s;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 2000);
    }, i*35);
  }
}

document.addEventListener('keydown', e => {
  if(!document.getElementById('gameScreen').classList.contains('active')) return;
  if(e.key>='0'&&e.key<='9') pad(parseInt(e.key));
  else if(e.key==='Backspace') padDel();
  else if(e.key==='Enter') checkAns();
});

updateMenuUI();
</script>
</body>
