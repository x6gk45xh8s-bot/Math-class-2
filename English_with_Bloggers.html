<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="English with Bloggers">
<title>English with Bloggers 📚</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fef9f0;
    --card: #ffffff;
    --accent1: #ff6b6b;
    --accent2: #4ecdc4;
    --accent3: #ffe66d;
    --accent4: #a29bfe;
    --accent5: #fd79a8;
    --text: #2d3436;
    --muted: #636e72;
    --border: rgba(0,0,0,0.08);
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --shadow-hover: 0 8px 32px rgba(0,0,0,0.14);
    --radius: 20px;
    --radius-sm: 12px;
    --green: #00b894;
    --red: #e17055;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== DECORATIVE BG ===== */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 10% 20%, rgba(255,107,107,0.08) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(78,205,196,0.10) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(162,155,254,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 0 16px 80px; }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    padding: 40px 20px 20px;
  }
  .header-mascot { font-size: 56px; margin-bottom: 8px; display: block; animation: bounce 2s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 36px;
    color: var(--text);
    letter-spacing: 0.5px;
  }
  .header h1 span { color: var(--accent1); }
  .header p { font-size: 15px; color: var(--muted); margin-top: 4px; font-weight: 600; }

  /* ===== SCREENS ===== */
  .screen { display: none; animation: fadeIn .3s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  /* ===== SECTION LABEL ===== */
  .sec-label {
    font-size: 13px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin: 24px 0 12px;
  }

  /* ===== LESSON CARDS ===== */
  .lesson-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 14px; }

  .lcard {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    border: 2px solid transparent;
    box-shadow: var(--shadow);
    transition: transform .2s, box-shadow .2s, border-color .2s;
    position: relative;
    overflow: hidden;
  }
  .lcard::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 80px; height: 80px;
    border-radius: 50%;
    opacity: 0.12;
    transition: transform .3s;
  }
  .lcard:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
  .lcard:hover::before { transform: scale(1.4); }

  .lcard.c0::before { background: var(--accent1); }
  .lcard.c1::before { background: var(--accent2); }
  .lcard.c2::before { background: var(--accent4); }
  .lcard.c3::before { background: var(--accent5); }
  .lcard.c4::before { background: var(--accent3); }
  .lcard:hover.c0 { border-color: var(--accent1); }
  .lcard:hover.c1 { border-color: var(--accent2); }
  .lcard:hover.c2 { border-color: var(--accent4); }
  .lcard:hover.c3 { border-color: var(--accent5); }
  .lcard:hover.c4 { border-color: var(--accent3); }

  .lcard-icon { font-size: 32px; margin-bottom: 10px; }
  .lcard-title { font-size: 16px; font-weight: 800; }
  .lcard-sub { font-size: 12px; color: var(--muted); margin-top: 4px; font-weight: 600; }
  .lcard-count { display: inline-block; margin-top: 10px; font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 20px; }
  .c0 .lcard-count { background: rgba(255,107,107,0.12); color: var(--accent1); }
  .c1 .lcard-count { background: rgba(78,205,196,0.12); color: #00a896; }
  .c2 .lcard-count { background: rgba(162,155,254,0.12); color: var(--accent4); }
  .c3 .lcard-count { background: rgba(253,121,168,0.12); color: var(--accent5); }
  .c4 .lcard-count { background: rgba(255,230,109,0.2); color: #c9930a; }

  /* ===== BACK BUTTON ===== */
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 14px; font-weight: 700; color: var(--muted);
    background: none; border: none; cursor: pointer;
    padding: 8px 0; margin-bottom: 8px;
    transition: color .15s;
  }
  .back-btn:hover { color: var(--text); }

  /* ===== LESSON HEADER ===== */
  .lesson-hdr {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 16px;
  }
  .lesson-hdr-icon { font-size: 36px; }
  .lesson-hdr h2 { font-size: 20px; font-weight: 800; }
  .lesson-hdr p { font-size: 13px; color: var(--muted); font-weight: 600; margin-top: 2px; }

  /* ===== GRAMMAR BOX ===== */
  .gram-box {
    background: linear-gradient(135deg, #f0fff4 0%, #e8f5f9 100%);
    border: 2px solid rgba(78,205,196,0.3);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .gram-title { font-size: 13px; font-weight: 800; color: #00a896; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  .gram-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; font-size: 13px; font-weight: 600; }
  .gram-row:last-child { margin-bottom: 0; }
  .pill { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .pill-green { background: rgba(0,184,148,0.15); color: var(--green); }
  .pill-red { background: rgba(225,112,85,0.15); color: var(--red); }
  .pill-blue { background: rgba(74,105,189,0.15); color: #4a69bd; }

  /* ===== MODE CARDS ===== */
  .mode-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  @media(min-width:500px){ .mode-grid { grid-template-columns: repeat(4,1fr); } }

  .mcard {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 12px;
    cursor: pointer;
    text-align: center;
    border: 2px solid transparent;
    box-shadow: var(--shadow);
    transition: transform .2s, box-shadow .2s, border-color .2s;
  }
  .mcard:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
  .mcard.m0:hover { border-color: var(--accent1); }
  .mcard.m1:hover { border-color: var(--accent2); }
  .mcard.m2:hover { border-color: var(--accent4); }
  .mcard.m3:hover { border-color: var(--accent5); }
  .mcard-icon { font-size: 28px; margin-bottom: 8px; }
  .mcard-name { font-size: 13px; font-weight: 800; }
  .mcard-desc { font-size: 11px; color: var(--muted); margin-top: 3px; font-weight: 600; }

  /* ===== ACTIVITY AREA ===== */
  .activity-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px 24px;
    box-shadow: var(--shadow);
  }

  /* progress */
  .prog-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .prog-bar-wrap { flex: 1; background: #f0f0f0; border-radius: 20px; height: 8px; overflow: hidden; }
  .prog-bar { height: 8px; border-radius: 20px; background: linear-gradient(90deg, var(--accent2), var(--accent4)); transition: width .4s ease; }
  .prog-label { font-size: 12px; font-weight: 800; color: var(--muted); white-space: nowrap; }

  /* question */
  .q-text {
    font-size: 22px; font-weight: 800; text-align: center;
    margin-bottom: 8px; line-height: 1.3;
  }
  .q-hint { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 20px; font-weight: 600; }

  /* choices */
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice-btn {
    padding: 14px 12px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--card);
    cursor: pointer;
    font-size: 14px; font-weight: 700;
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    text-align: left;
    transition: border-color .15s, background .15s, transform .1s;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--accent4); background: rgba(162,155,254,0.06); transform: scale(1.01); }
  .choice-btn.correct { background: rgba(0,184,148,0.1); border-color: var(--green); color: #00664d; }
  .choice-btn.wrong { background: rgba(225,112,85,0.1); border-color: var(--red); color: #a0401f; }
  .choice-btn:disabled { cursor: default; }

  /* feedback */
  .feedback {
    text-align: center; margin-top: 14px;
    font-size: 16px; font-weight: 800; min-height: 26px;
    transition: opacity .2s;
  }
  .feedback.ok { color: var(--green); }
  .feedback.no { color: var(--red); }

  /* next button */
  .next-btn {
    display: block; margin: 16px auto 0;
    padding: 12px 32px;
    background: linear-gradient(135deg, var(--accent4), var(--accent2));
    color: white; border: none; border-radius: 40px;
    font-size: 15px; font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(162,155,254,0.4);
    transition: transform .15s, box-shadow .15s;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(162,155,254,0.5); }
  .next-btn:active { transform: scale(0.97); }

  /* ===== FLASHCARD ===== */
  .fc-container { perspective: 1000px; margin-bottom: 16px; }
  .fc {
    background: linear-gradient(135deg, #ffecd2, #fcb69f);
    border-radius: var(--radius);
    padding: 36px 24px;
    text-align: center; cursor: pointer;
    min-height: 200px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: var(--shadow);
    transition: transform .15s;
    position: relative;
  }
  .fc:hover { transform: scale(1.01); }
  .fc-emoji { font-size: 44px; margin-bottom: 12px; }
  .fc-en { font-size: 28px; font-weight: 800; }
  .fc-cs { font-size: 20px; color: rgba(45,52,54,0.7); margin-top: 10px; font-weight: 700; }
  .fc-ex { font-size: 13px; color: rgba(45,52,54,0.6); margin-top: 8px; font-style: italic; font-weight: 600; }
  .fc-tip { font-size: 12px; color: rgba(45,52,54,0.5); margin-top: 14px; font-weight: 600; }
  .fc-nav { display: flex; gap: 10px; justify-content: center; }
  .fc-nav-btn {
    flex: 1; max-width: 140px;
    padding: 12px;
    border: 2px solid var(--border); border-radius: var(--radius-sm);
    background: var(--card); cursor: pointer;
    font-size: 14px; font-weight: 800; font-family: 'Nunito', sans-serif;
    color: var(--text);
    transition: border-color .15s, background .15s;
  }
  .fc-nav-btn:hover { border-color: var(--accent4); background: rgba(162,155,254,0.06); }

  /* ===== SPEAK BTN ===== */
  .speak-btn {
    background: none; border: none; cursor: pointer;
    font-size: 18px; padding: 2px 6px; border-radius: 8px;
    transition: background .15s; vertical-align: middle;
  }
  .speak-btn:hover { background: rgba(0,0,0,0.06); }

  /* ===== FILL BLANK ===== */
  .fill-sentence {
    font-size: 20px; font-weight: 700; text-align: center;
    display: flex; align-items: center; justify-content: center;
    flex-wrap: wrap; gap: 8px; margin-bottom: 8px;
    line-height: 1.8;
  }
  .fill-input {
    border: none; border-bottom: 3px solid var(--accent4);
    background: transparent;
    font-size: 20px; font-weight: 800;
    font-family: 'Nunito', sans-serif;
    color: var(--text); text-align: center;
    width: 160px; outline: none; padding: 2px 4px;
    transition: border-color .15s;
  }
  .fill-input:focus { border-bottom-color: var(--accent1); }
  .submit-btn {
    display: block; margin: 14px auto 0;
    padding: 11px 28px;
    background: var(--card); border: 2px solid var(--accent4);
    border-radius: 40px; font-size: 14px; font-weight: 800;
    font-family: 'Nunito', sans-serif; color: var(--accent4);
    cursor: pointer; transition: background .15s, color .15s;
  }
  .submit-btn:hover { background: var(--accent4); color: white; }

  /* ===== RESULT ===== */
  .result-wrap {
    text-align: center; padding: 32px 16px;
  }
  .result-trophy { font-size: 64px; margin-bottom: 12px; animation: pop .4s ease; }
  @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
  .result-score { font-family: 'Fredoka One', cursive; font-size: 56px; color: var(--green); }
  .result-label { font-size: 16px; color: var(--muted); font-weight: 700; margin-top: 4px; }
  .result-stars { font-size: 36px; margin: 12px 0; }
  .result-msg { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
  .result-btns { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .result-btn {
    padding: 11px 22px;
    border: 2px solid var(--border); border-radius: 40px;
    background: var(--card); font-size: 14px; font-weight: 800;
    font-family: 'Nunito', sans-serif; color: var(--text);
    cursor: pointer; transition: border-color .15s, background .15s;
    box-shadow: var(--shadow);
  }
  .result-btn:hover { border-color: var(--accent4); background: rgba(162,155,254,0.06); }
  .result-btn.primary { background: linear-gradient(135deg, var(--accent1), var(--accent5)); color: white; border-color: transparent; box-shadow: 0 4px 16px rgba(255,107,107,0.35); }
  .result-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,107,107,0.45); }

  /* ===== STREAK / SCORE BADGE ===== */
  .top-bar {
    display: flex; justify-content: flex-end; gap: 8px; padding: 12px 0 0;
    margin-bottom: -4px;
  }
  .badge {
    display: flex; align-items: center; gap: 5px;
    background: var(--card); border-radius: 20px; padding: 6px 14px;
    font-size: 13px; font-weight: 800; box-shadow: var(--shadow);
    color: var(--text);
  }

  /* ===== CONFETTI ===== */
  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 100; overflow: hidden; }
  .conf { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: fall linear forwards; }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ===== INSTALL BANNER ===== */
  .install-banner {
    background: linear-gradient(135deg, var(--accent3), #ffa502);
    border-radius: var(--radius);
    padding: 14px 20px;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: var(--shadow);
    cursor: pointer;
  }
  .install-banner .ib-icon { font-size: 24px; }
  .install-banner .ib-text { flex: 1; }
  .install-banner .ib-title { font-size: 14px; font-weight: 800; color: #4a3000; }
  .install-banner .ib-sub { font-size: 12px; color: #7a5200; font-weight: 600; margin-top: 2px; }
  .install-banner .ib-close { font-size: 18px; color: #7a5200; background: none; border: none; cursor: pointer; padding: 4px; }

  /* ===== RESPONSIVE ===== */
  @media(max-width:480px) {
    .header h1 { font-size: 28px; }
    .q-text { font-size: 18px; }
    .choices { grid-template-columns: 1fr; }
    .activity-card { padding: 20px 16px; }
  }
</style>
</head>
<body>

<div id="confetti-wrap" class="confetti-wrap"></div>

<div class="app">
  <div class="top-bar">
    <div class="badge">⭐ <span id="total-score">0</span> pts</div>
    <div class="badge">🔥 <span id="streak">0</span></div>
  </div>

  <div class="header">
    <span class="header-mascot">🦉</span>
    <h1>English with <span>Bloggers</span></h1>
    <p>Unit 2 · My Family &amp; Appearance</p>
  </div>

  <!-- SCREEN: home -->
  <div class="screen active" id="screen-home">
    <div id="install-banner-wrap"></div>
    <div class="sec-label">📚 Choose your lesson</div>
    <div class="lesson-grid" id="lesson-grid"></div>
  </div>

  <!-- SCREEN: mode -->
  <div class="screen" id="screen-mode">
    <button class="back-btn" onclick="showScreen('home')">← Back</button>
    <div class="lesson-hdr" id="lesson-hdr"></div>
    <div id="gram-preview"></div>
    <div class="sec-label">🎮 Choose your activity</div>
    <div class="mode-grid">
      <div class="mcard m0" onclick="startActivity('flashcards')">
        <div class="mcard-icon">🃏</div>
        <div class="mcard-name">Flashcards</div>
        <div class="mcard-desc">Study the words</div>
      </div>
      <div class="mcard m1" onclick="startActivity('quiz')">
        <div class="mcard-icon">❓</div>
        <div class="mcard-name">Quiz</div>
        <div class="mcard-desc">Pick the answer</div>
      </div>
      <div class="mcard m2" onclick="startActivity('fill')">
        <div class="mcard-icon">✏️</div>
        <div class="mcard-name">Fill the gap</div>
        <div class="mcard-desc">Type the word</div>
      </div>
      <div class="mcard m3" onclick="startActivity('listen')">
        <div class="mcard-icon">🔊</div>
        <div class="mcard-name">Listen &amp; pick</div>
        <div class="mcard-desc">Hear and choose</div>
      </div>
    </div>
  </div>

  <!-- SCREEN: activity -->
  <div class="screen" id="screen-activity">
    <button class="back-btn" onclick="showScreen('mode')">← Back</button>
    <div class="activity-card" id="activity-area"></div>
  </div>

  <!-- SCREEN: result -->
  <div class="screen" id="screen-result">
    <div class="activity-card">
      <div class="result-wrap">
        <div class="result-trophy" id="res-trophy">🏆</div>
        <div class="result-score" id="res-score"></div>
        <div class="result-label">correct answers</div>
        <div class="result-stars" id="res-stars"></div>
        <div class="result-msg" id="res-msg"></div>
        <div class="result-btns">
          <button class="result-btn primary" onclick="startActivity(curMode)">🔁 Try again</button>
          <button class="result-btn" onclick="showScreen('mode')">🎮 Other activities</button>
          <button class="result-btn" onclick="showScreen('home')">📚 Choose lesson</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== DATA — exact vocabulary from Bloggers A1.1 workbook pp.72–73 =====
const LESSONS = [
  {
    id:0, icon:"👨‍👩‍👧‍👦", title:"2A – We are family!", tag:"Family words",
    topic:"Family members · pp.42–43 · workbook p.72",
    color: 0,
    grammar:{
      title:"have got — positive & negative",
      rows:[
        {subject:"I / You / We / They", pos:"have got", neg:"haven't got", ex:"a sister"},
        {subject:"He / She / It", pos:"has got", neg:"hasn't got", ex:"a brother"},
      ]
    },
    // exact word list from workbook p.72 — 2A column
    vocab:[
      {en:"aunt",          cs:"teta",                          emoji:"👩",  ex:"This is my aunt."},
      {en:"brother",       cs:"bratr",                         emoji:"🧑",  ex:"I haven't got a brother."},
      {en:"children",      cs:"děti",                          emoji:"👦👧", ex:"They have got one daughter."},
      {en:"cousin",        cs:"bratranec / sestřenice",         emoji:"🧒",  ex:"She is my cousin."},
      {en:"daughter",      cs:"dcera",                         emoji:"👧",  ex:"They have got one daughter."},
      {en:"father / daddy",cs:"otec / táta",                   emoji:"👨",  ex:"He is my father."},
      {en:"granddaughter", cs:"vnučka",                        emoji:"👧",  ex:"She is their granddaughter."},
      {en:"grandfather / grandpa", cs:"dědeček ❹ / děda",     emoji:"👴",  ex:"My grandpa loves the car."},
      {en:"grandmother / grandma", cs:"babička ❺ / babi",     emoji:"👵",  ex:"I love my grandma!"},
      {en:"grandparents",  cs:"prarodiče",                     emoji:"👴👵", ex:"My grandparents are really fun."},
      {en:"grandson",      cs:"vnuk",                          emoji:"👦",  ex:"He is their grandson."},
      {en:"husband",       cs:"manžel",                        emoji:"💍",  ex:"Her husband is kind."},
      {en:"mother / mum",  cs:"matka / máma",                  emoji:"👩",  ex:"She is my mother."},
      {en:"parents",       cs:"rodiče",                        emoji:"👫",  ex:"My parents are from America."},
      {en:"sister",        cs:"sestra",                        emoji:"👧",  ex:"My sister is called Claire."},

// ===== STATE =====
let curLesson=null, curMode=null, curQ=0, score=0, questions=[], fcIdx=0, fcFlipped=false;
let totalScore = parseInt(localStorage.getItem('totalScore')||0);
let streak = parseInt(localStorage.getItem('streak')||0);

function updateBadges(){
  document.getElementById('total-score').textContent = totalScore;
  document.getElementById('streak').textContent = streak;
}
updateBadges();

// ===== SCREENS =====
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  window.scrollTo(0,0);
  if(name==='home') renderHome();
}

function renderHome(){
  document.getElementById('lesson-grid').innerHTML = LESSONS.map(l=>`
    <div class="lcard c${l.color}" onclick="selectLesson(${l.id})">
      <div class="lcard-icon">${l.icon}</div>
      <div class="lcard-title">${l.title}</div>
      <div class="lcard-sub">${l.topic}</div>
      <span class="lcard-count">${l.vocab.length} words</span>
    </div>`).join('');

  // install banner + voice status
  const wrap = document.getElementById('install-banner-wrap');
  const dismissed = localStorage.getItem('install-dismissed');
  const voiceStatus = getVoiceStatus();
  const voiceOk = voiceStatus && voiceStatus.startsWith('🔊');
  let html = '';
  if(!voiceOk && voiceStatus){
    html += `<div class="install-banner" style="background:linear-gradient(135deg,#ffeaa7,#fdcb6e);margin-bottom:10px">
      <div class="ib-icon">🔊</div>
      <div class="ib-text">
        <div class="ib-title">No English voice found!</div>
        <div class="ib-sub">Open Chrome (not Safari). Or: System Settings → Accessibility → Spoken Content → add English voice</div>
      </div>
      <button class="ib-close" onclick="this.parentElement.remove()">✕</button>
    </div>`;
  } else if(voiceOk){
    html += `<div style="text-align:right;font-size:11px;color:var(--muted);font-weight:700;margin-bottom:8px">${voiceStatus}</div>`;
  }
  if(!dismissed){
    html += `<div class="install-banner" onclick="showInstallHelp()">
        <div class="ib-icon">💻</div>
        <div class="ib-text">
          <div class="ib-title">Tip: Install as App on your MacBook!</div>
          <div class="ib-sub">Open in Chrome → Menu (⋮) → Save &amp; share → Create shortcut</div>
        </div>
        <button class="ib-close" onclick="event.stopPropagation();dismissBanner()">✕</button>
      </div>`;
  }
  wrap.innerHTML = html;
}

function dismissBanner(){
  localStorage.setItem('install-dismissed','1');
  document.getElementById('install-banner-wrap').innerHTML='';
}

function showInstallHelp(){
  alert('How to install on MacBook:\n\n🟢 In Google Chrome:\nMenu (⋮) → Save and share → Create shortcut\nTick "Open as window" → Create!\n\n🔵 In Safari:\nFile → Add to Dock\n\nThe app will appear in your Dock like a real app! 🎉');
}

function selectLesson(id){
  curLesson = LESSONS[id];
  const colors = ['#ff6b6b','#4ecdc4','#a29bfe','#fd79a8','#f9ca24'];
  document.getElementById('lesson-hdr').innerHTML=`
    <div class="lesson-hdr-icon">${curLesson.icon}</div>
    <div>
      <h2>${curLesson.title}</h2>
      <p>${curLesson.topic} · ${curLesson.vocab.length} words</p>
    </div>`;

  const gp = document.getElementById('gram-preview');
  if(curLesson.grammar){
    const g = curLesson.grammar;
    const rows = g.rows.map(r=>`
      <div class="gram-row">
        <span style="font-weight:700;min-width:120px">${r.subject}</span>
        ${r.pos?`<span class="pill pill-green">${r.pos}</span>`:''}
        ${r.neg?`<span class="pill pill-red">${r.neg}</span>`:''}
        ${r.ex?`<span style="color:var(--muted);font-size:12px">${r.ex}</span>`:''}
      </div>`).join('');
    gp.innerHTML=`<div class="gram-box"><div class="gram-title">📋 ${g.title}</div>${rows}</div>`;
  } else gp.innerHTML='';

  showScreen('mode');
}

// ===== ACTIVITIES =====
function startActivity(mode){
  curMode=mode; curQ=0; score=0;
  showScreen('activity');
  if(mode==='flashcards'){fcIdx=0;fcFlipped=false;renderFC();}
  else if(mode==='quiz'){buildQuiz();renderQuiz();}
  else if(mode==='fill'){questions=shuffle([...curLesson.fill]);renderFill();}
  else if(mode==='listen'){buildListen();renderListen();}
}

function buildQuiz(){
  questions = shuffle(curLesson.vocab).slice(0,Math.min(10,curLesson.vocab.length)).map(item=>{
    const others = curLesson.vocab.filter(v=>v.en!==item.en);
    const wrong = shuffle(others).slice(0,3).map(v=>v.cs);
    return {question:item.en, answer:item.cs, choices:shuffle([item.cs,...wrong]), emoji:item.emoji, ex:item.ex};
  });
}

function buildListen(){
  questions = shuffle(curLesson.vocab).slice(0,Math.min(8,curLesson.vocab.length)).map(item=>{
    const others = curLesson.vocab.filter(v=>v.en!==item.en);
    const wrong = shuffle(others).slice(0,3).map(v=>v.en);
    return {toSpeak:item.en, answer:item.en, choices:shuffle([item.en,...wrong]), emoji:item.emoji};
  });
}

// ===== FLASHCARD =====
function renderFC(){
  const v = curLesson.vocab;
  const area = document.getElementById('activity-area');
  if(fcIdx>=v.length){
    area.innerHTML=`
      <div class="result-wrap">
        <div class="result-trophy">🎉</div>
        <div class="result-score" style="font-size:28px">All ${v.length} words!</div>
        <div class="result-label" style="margin-bottom:20px">Amazing! Now try a quiz!</div>
        <div class="result-btns">
          <button class="result-btn primary" onclick="startActivity('quiz')">❓ Try quiz!</button>
          <button class="result-btn" onclick="startActivity('flashcards')">🔁 Again</button>
          <button class="result-btn" onclick="showScreen('mode')">← Back</button>
        </div>
      </div>`;
    return;
  }
  const w = v[fcIdx];
  const pct = Math.round(fcIdx/v.length*100);
  area.innerHTML=`
    <div class="prog-row">
      <div class="prog-bar-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
      <span class="prog-label">${fcIdx+1}/${v.length}</span>
    </div>
    <div class="fc-container">
      <div class="fc" id="fc-card" onclick="flipFC()">
        <div class="fc-emoji">${w.emoji}</div>
        <div class="fc-en">${w.en} <button class="speak-btn" onclick="event.stopPropagation();speak('${esc(w.en)}')">🔊</button></div>
        <div class="fc-cs" id="fc-cs" style="display:none">${w.cs}</div>
        ${w.ex?`<div class="fc-ex" id="fc-ex" style="display:none">"${w.ex}" <button class="speak-btn" onclick="event.stopPropagation();speak('${esc(w.ex)}')">🔊</button></div>`:''}
        <div class="fc-tip" id="fc-tip">👆 Tap to see Czech</div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="fc-nav-btn" onclick="fcIdx=Math.max(0,fcIdx-1);fcFlipped=false;renderFC()">← Prev</button>
      <button class="fc-nav-btn" onclick="fcIdx++;fcFlipped=false;renderFC()">Next →</button>
    </div>`;
}

function flipFC(){
  fcFlipped=!fcFlipped;
  const cs=document.getElementById('fc-cs');
  const ex=document.getElementById('fc-ex');
  const tip=document.getElementById('fc-tip');
  if(fcFlipped){cs.style.display='block';if(ex)ex.style.display='block';tip.textContent='👆 Tap to hide';}
  else{cs.style.display='none';if(ex)ex.style.display='none';tip.textContent='👆 Tap to see Czech';}
}

// ===== QUIZ =====
function renderQuiz(){
  if(curQ>=questions.length){showResult();return;}
  const q=questions[curQ];
  const pct=Math.round(curQ/questions.length*100);
  document.getElementById('activity-area').innerHTML=`
    <div class="prog-row">
      <div class="prog-bar-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
      <span class="prog-label">${curQ+1}/${questions.length}</span>
    </div>
    <div class="q-text">${q.emoji} ${q.question} <button class="speak-btn" onclick="speak('${esc(q.question)}')">🔊</button></div>
    <div class="q-hint">What does this mean in Czech?</div>
    <div class="choices">
      ${q.choices.map(c=>`<button class="choice-btn" onclick="checkQ(this,'${esc(c)}','${esc(q.answer)}','quiz')">${c}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nbtn" style="display:none" onclick="curQ++;renderQuiz()">Next →</button>`;
}

  document.getElementById('activity-area').innerHTML=`
    <div class="prog-row">
      <div class="prog-bar-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
      <span class="prog-label">${curQ+1}/${questions.length}</span>
    </div>
    <div class="q-text">${q.emoji}</div>
    <div style="text-align:center;margin-bottom:16px">
      <button class="next-btn" onclick="speak('${esc(q.toSpeak)}')">🔊 Listen again</button>
    </div>
    <div class="q-hint">Which word did you hear?</div>
    <div class="choices">
      ${q.choices.map(c=>`<button class="choice-btn" onclick="checkQ(this,'${esc(c)}','${esc(q.answer)}','listen')">${c}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nbtn" style="display:none" onclick="curQ++;renderListen()">Next →</button>`;
  setTimeout(()=>speak(q.toSpeak),600);
}

function checkQ(btn,chosen,answer,mode){
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  if(chosen===answer){
    btn.classList.add('correct');
    fb.textContent='✓ Correct! Amazing! 🎉';
    fb.className='feedback ok';
    score++; totalScore+=10; streak++;
  } else {
    btn.classList.add('wrong');
    fb.textContent='✗ The answer is: '+answer;
    fb.className='feedback no';
    streak=0;
    document.querySelectorAll('.choice-btn').forEach(b=>{if(b.textContent.trim()===answer)b.classList.add('correct');});
  }
  localStorage.setItem('totalScore',totalScore);
  localStorage.setItem('streak',streak);
  updateBadges();
  document.getElementById('nbtn').style.display='block';
}

// ===== FILL =====
function renderFill(){
  if(curQ>=questions.length){showResult();return;}
  const q=questions[curQ];
  const pct=Math.round(curQ/questions.length*100);
  const parts=q.s.split('___');
  document.getElementById('activity-area').innerHTML=`
    <div class="prog-row">
      <div class="prog-bar-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
      <span class="prog-label">${curQ+1}/${questions.length}</span>
    </div>
    <div class="fill-sentence">
      <span>${parts[0]}</span>
      <input class="fill-input" type="text" id="blank" placeholder="???" autocomplete="off" spellcheck="false"/>
      <span>${parts[1]||''}</span>
    </div>
    <div class="q-hint">💡 Hint: ${q.h}</div>
    <button class="submit-btn" id="sbtn" onclick="checkFill()">Check ✓</button>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nbtn" style="display:none" onclick="curQ++;renderFill()">Next →</button>`;
  const inp=document.getElementById('blank');
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkFill();});
  inp.focus();
}

function checkFill(){
  const inp=document.getElementById('blank');
  if(!inp||inp.disabled)return;
  const val=inp.value.trim().toLowerCase();
  const q=questions[curQ];
  inp.disabled=true;
  document.getElementById('sbtn').disabled=true;
  const fb=document.getElementById('feedback');
  if(val===q.a.toLowerCase()){
    inp.style.borderBottomColor='var(--green)';
    fb.textContent='✓ Correct! Well done! 🌟';
    fb.className='feedback ok';
    score++; totalScore+=10; streak++;
  } else {
    inp.style.borderBottomColor='var(--red)';
    fb.textContent='✗ The answer is: '+q.a;
    fb.className='feedback no';
    streak=0;
  }
  localStorage.setItem('totalScore',totalScore);
  localStorage.setItem('streak',streak);
  updateBadges();
  document.getElementById('nbtn').style.display='block';
}

// ===== RESULT =====
function showResult(){
  showScreen('result');
  const total=questions.length;
  const pct=Math.round(score/total*100);
  document.getElementById('res-score').textContent=score+' / '+total;
  let stars='⭐', msg="Good try! Keep practising!", trophy='🎯';
  if(pct>=90){stars='⭐⭐⭐';msg='You are an English superstar! 🚀';trophy='🏆';confetti();}
  else if(pct>=70){stars='⭐⭐';msg='Great job! Almost perfect!';trophy='🥈';}
  else if(pct>=50){stars='⭐';msg='Good try! A bit more practice!';}
  document.getElementById('res-trophy').textContent=trophy;
  document.getElementById('res-stars').textContent=stars;
  document.getElementById('res-msg').textContent=msg;
}

// ===== CONFETTI =====
function confetti(){
  const wrap=document.getElementById('confetti-wrap');
  const colors=['#ff6b6b','#4ecdc4','#ffe66d','#a29bfe','#fd79a8','#00b894'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='conf';
    el.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;border-radius:${Math.random()>0.5?'50%':'2px'}`;
    wrap.appendChild(el);
    setTimeout(()=>el.remove(),4000);
  }
}

// ===== HELPERS =====
// ===== VOICE SETUP =====
let englishVoice = null;

function loadEnglishVoice(){
  const voices = window.speechSynthesis.getVoices();
  if(!voices.length) return;

  // Priority list: best English voices on macOS / Chrome
  const preferred = [
    'Samantha',        // macOS default English (best quality)
    'Karen',           // macOS Australian
    'Daniel',          // macOS British
    'Moira',           // macOS Irish
    'Tessa',           // macOS South African
    'Victoria',        // macOS US
    'Alex',            // macOS US (older)
  ];

  // Try preferred voices by exact name first
  for(const name of preferred){
    const v = voices.find(v => v.name === name);
    if(v){ englishVoice = v; return; }
  }

  // Fall back: any en-GB voice
  englishVoice = voices.find(v => v.lang === 'en-GB' && !v.localService === false)
    || voices.find(v => v.lang === 'en-GB')
    || voices.find(v => v.lang === 'en-US')
    || voices.find(v => v.lang.startsWith('en-'))
    || voices.find(v => v.lang.startsWith('en'))
    || null;
}

// Voices load asynchronously — hook both ways
if(window.speechSynthesis){
  loadEnglishVoice();
  window.speechSynthesis.onvoiceschanged = loadEnglishVoice;
}

function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-GB';
  u.rate = 0.82;
  u.pitch = 1.05;

  // Always force an English voice — never let browser pick Czech by default
  if(englishVoice){
    u.voice = englishVoice;
    u.lang = englishVoice.lang; // match lang to voice to avoid mismatch
  }

  window.speechSynthesis.speak(u);
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function esc(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

// ===== VOICE STATUS =====
function getVoiceStatus(){
  if(!window.speechSynthesis) return null;
  if(!englishVoice) loadEnglishVoice();
  if(englishVoice) return '🔊 Voice: ' + englishVoice.name;
  return '⚠️ No English voice found — check System Settings → Accessibility → Spoken Content';
}

// ===== INIT =====
renderHome();
// Re-render after voices load (async on some browsers)
setTimeout(()=>{ loadEnglishVoice(); }, 800);
</script>
